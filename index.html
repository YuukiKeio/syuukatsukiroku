<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>就活キロク</title>
<link rel="stylesheet" href="style.css?v=4">
</head>
<body>
<div class="app" id="app">
  <aside class="sidebar">
    <div class="brand"><span class="brand-mark">キ</span><span>就活キロク</span></div>
    <nav aria-label="メインナビゲーション" id="sideNav">
      <button class="nav-item" data-view="home"><span>⌂</span>ホーム</button>
      <button class="nav-item" data-view="self"><span>◎</span>自己分析</button>
      <button class="nav-item" data-view="interview"><span>◫</span>面接対策</button>
      <button class="nav-item" data-view="review"><span>↺</span>面接復盤</button>
      <button class="nav-item" data-view="stats"><span>▥</span>統計</button>
      <button class="nav-item" data-view="calendar"><span>□</span>カレンダー</button>
      <button class="nav-item" data-view="settings"><span>⋯</span>設定</button>
    </nav>
    <div class="privacy-note">
      <span class="privacy-icon">✓</span>
      <div><strong>端末内に保存</strong><small>データは外部に送信されません</small></div>
    </div>
    <button class="theme-button" id="themeBtn"><span>☾</span>ダークモード</button>
  </aside>

  <main class="main-shell">
    <header class="topbar">
      <div class="mobile-brand"><span class="brand-mark">キ</span>就活キロク</div>
      <div class="search-box"><span>⌕</span><input id="searchInput" aria-label="検索" placeholder="会社名・活動名で検索"></div>
      <button class="icon-button" aria-label="通知">●<span class="notification-dot"></span></button>
      <button class="avatar" aria-label="プロフィール">Y</button>
    </header>
    <div class="content" id="content"></div>
  </main>

  <nav class="bottom-nav" aria-label="モバイルナビゲーション" id="bottomNav">
    <button data-view="home"><span>⌂</span>ホーム</button>
    <button data-view="self"><span>◎</span>自己分析</button>
    <button class="bottom-add" id="bottomAdd" aria-label="記録を追加">＋</button>
    <button data-view="interview"><span>◫</span>面接</button>
    <button data-view="stats"><span>▥</span>統計</button>
  </nav>

  <div id="overlayRoot"></div>
  <div class="save-flash" id="saveFlash">✓ 保存しました</div>
</div>
<script src="app.js?v=4"></script>
</body>
</html>
