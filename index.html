<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>就活記録</title>
<style>
  :root {
    --bg: #f5f6f8;
    --card: #ffffff;
    --text: #1a1d23;
    --sub: #6b7280;
    --line: #e5e7eb;
    --accent: #2563eb;
    --accent-soft: #eff6ff;
    --danger: #dc2626;
    --green: #059669;
    --green-soft: #ecfdf5;
    --orange: #d97706;
    --orange-soft: #fffbeb;
    --radius: 12px;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Noto Sans JP", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  .container { max-width: 960px; margin: 0 auto; padding: 0 16px 80px; }

  /* ===== Header ===== */
  header {
    position: sticky; top: 0; z-index: 50;
    background: rgba(255,255,255,.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--line);
  }
  .header-inner {
    max-width: 960px; margin: 0 auto; padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo { font-size: 20px; font-weight: 700; letter-spacing: .04em; }
  .logo span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .save-status { font-size: 12px; color: var(--sub); transition: opacity .4s; opacity: 0; }
  .save-status.show { opacity: 1; }
  .add-btn {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--accent); color: #fff; border: none;
    font-size: 24px; line-height: 1; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(37,99,235,.35);
    transition: transform .15s;
  }
  .add-btn:hover { transform: scale(1.08); }
  .gear-btn {
    width: 40px; height: 40px; border-radius: 50%;
    background: #fff; color: var(--sub); border: 1px solid var(--line);
    font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  .gear-btn:hover { color: var(--text); border-color: var(--sub); }
  .backup-note { font-size: 13px; color: var(--sub); margin-bottom: 18px; line-height: 1.8; }
  .backup-note strong { color: var(--danger); }
  .backup-actions { display: flex; flex-direction: column; gap: 10px; }
  .btn-outline { background: #fff; border: 1px solid var(--line); color: var(--text); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

  /* ===== Sections ===== */
  .section { margin-top: 28px; }
  .section-title {
    font-size: 15px; font-weight: 700; color: var(--text);
    display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
  }
  .section-title .count {
    background: var(--accent); color: #fff; font-size: 12px;
    min-width: 22px; height: 22px; border-radius: 11px; padding: 0 7px;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .section-title .dot { width: 8px; height: 8px; border-radius: 50%; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 640px) { .two-col { grid-template-columns: 1fr; } }

  .card-list { display: flex; flex-direction: column; gap: 10px; }
  .entry-card {
    background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 14px 16px; cursor: pointer; border: 1px solid transparent;
    transition: border-color .15s, transform .15s;
  }
  .entry-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .entry-card .top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .entry-name { font-weight: 700; font-size: 15px; }
  .type-badge {
    font-size: 11px; padding: 2px 10px; border-radius: 999px;
    background: var(--accent-soft); color: var(--accent); white-space: nowrap; font-weight: 600;
  }
  .entry-meta { font-size: 12px; color: var(--sub); margin-top: 6px; display: flex; gap: 12px; flex-wrap: wrap; }
  .empty-hint {
    color: var(--sub); font-size: 13px; text-align: center;
    padding: 24px; background: var(--card); border-radius: var(--radius);
    border: 1px dashed var(--line);
  }

  /* ===== Modal ===== */
  .overlay {
    position: fixed; inset: 0; background: rgba(17,24,39,.45);
    display: none; align-items: flex-start; justify-content: center;
    z-index: 100; padding: 40px 16px; overflow-y: auto;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--card); border-radius: 16px; width: 100%; max-width: 560px;
    padding: 24px; box-shadow: 0 20px 50px rgba(0,0,0,.2);
  }
  .modal h2 { font-size: 17px; margin-bottom: 18px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 13px; font-weight: 600; color: var(--sub); margin-bottom: 6px; }
  input[type="text"], input[type="date"], input[type="time"], textarea, select {
    width: 100%; padding: 9px 12px; border: 1px solid var(--line); border-radius: 8px;
    font-size: 14px; font-family: inherit; background: #fff; color: var(--text);
  }
  input:focus, textarea:focus, select:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: transparent; }
  textarea { resize: vertical; min-height: 80px; }
  .type-options { display: flex; flex-wrap: wrap; gap: 8px; }
  .type-chip {
    padding: 6px 14px; border-radius: 999px; border: 1px solid var(--line);
    background: #fff; font-size: 13px; cursor: pointer; transition: all .12s;
  }
  .type-chip.selected { background: var(--accent); color: #fff; border-color: var(--accent); }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 22px; }
  .date-row { display: flex; gap: 10px; }
  .date-row input { flex: 1; }
  .dt-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .dt-row .dt-label { font-size: 12px; color: var(--sub); width: 32px; font-weight: 600; flex-shrink: 0; }
  .dt-row input { flex: 1; min-width: 0; }
  .result-badge {
    font-size: 11px; padding: 2px 10px; border-radius: 999px;
    background: var(--green-soft); color: var(--green); white-space: nowrap; font-weight: 700;
    border: 1px solid #a7f3d0;
  }
  .type-chip.mark-on { background: var(--green); border-color: var(--green); color: #fff; }
  .done-btn {
    width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid var(--line);
    background: #fff; color: transparent; cursor: pointer; font-size: 13px; line-height: 1;
    flex-shrink: 0; transition: all .15s;
  }
  .done-btn:hover { border-color: var(--green); color: #d1d5db; }
  .done-btn.on { background: var(--green); border-color: var(--green); color: #fff; }
  .step-card.done .step-kind { color: var(--sub); }
  .step-card.done .step-head { background: var(--green-soft); }
  .loc-link { font-size: 12px; color: var(--accent); margin-top: 4px; display: inline-block; word-break: break-all; }
  .btn {
    padding: 9px 20px; border-radius: 8px; border: none; font-size: 14px;
    cursor: pointer; font-family: inherit; font-weight: 600;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-ghost { background: transparent; color: var(--sub); }
  .btn-ghost:hover { background: var(--bg); }
  .btn-danger-ghost { background: transparent; color: var(--danger); }
  .btn-danger-ghost:hover { background: #fef2f2; }

  /* ===== Detail panel ===== */
  .detail-modal { max-width: 720px; }
  .detail-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 4px; }
  .detail-title { font-size: 19px; font-weight: 700; }
  .close-x {
    background: none; border: none; font-size: 22px; color: var(--sub);
    cursor: pointer; line-height: 1; padding: 4px;
  }
  .status-tabs { display: flex; gap: 6px; margin: 14px 0 20px; }
  .status-tab {
    padding: 5px 14px; border-radius: 999px; font-size: 12.5px; cursor: pointer;
    border: 1px solid var(--line); background: #fff; font-weight: 600; color: var(--sub);
  }
  .status-tab.active-ongoing { background: var(--accent); border-color: var(--accent); color: #fff; }
  .status-tab.active-upcoming { background: var(--orange); border-color: var(--orange); color: #fff; }
  .status-tab.active-done { background: var(--green); border-color: var(--green); color: #fff; }

  .step-card {
    border: 1px solid var(--line); border-radius: var(--radius);
    margin-bottom: 12px; overflow: hidden;
  }
  .step-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px; cursor: pointer; background: #fafafa;
  }
  .step-head:hover { background: #f3f4f6; }
  .step-head .left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .step-kind { font-weight: 700; font-size: 14px; }
  .step-date-label { font-size: 12px; color: var(--sub); }
  .chev { color: var(--sub); font-size: 12px; transition: transform .2s; }
  .step-card.open .chev { transform: rotate(90deg); }
  .step-body { padding: 14px; display: none; border-top: 1px solid var(--line); }
  .step-card.open .step-body { display: block; }
  .step-datetime { display: flex; gap: 10px; margin-bottom: 14px; }
  .step-datetime input { width: auto; flex: 1; }

  .q-item {
    border: 1px solid var(--line); border-radius: 10px; padding: 12px; margin-bottom: 10px;
    background: #fff;
  }
  .q-item-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .q-num { font-size: 12px; font-weight: 700; color: var(--accent); white-space: nowrap; }
  .q-tag-select { width: auto !important; font-size: 12px; padding: 3px 8px; }
  .q-tag-select.tag-honban { color: var(--danger); font-weight: 700; }
  .q-tag-select.tag-yosoku { color: var(--orange); font-weight: 700; }
  .q-del {
    margin-left: auto; background: none; border: none; color: var(--sub);
    cursor: pointer; font-size: 16px; padding: 2px 6px;
  }
  .q-del:hover { color: var(--danger); }
  .q-item textarea { min-height: 48px; font-size: 13.5px; }
  .q-item .q-question { margin-bottom: 8px; min-height: 38px; }
  .mini-label { font-size: 11.5px; color: var(--sub); font-weight: 600; margin-bottom: 4px; display: block; }
  .add-mini-btn {
    width: 100%; padding: 8px; border: 1px dashed var(--line); border-radius: 8px;
    background: none; color: var(--accent); font-size: 13px; cursor: pointer; font-weight: 600;
  }
  .add-mini-btn:hover { background: var(--accent-soft); }

  .add-step-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
  .detail-footer { display: flex; justify-content: space-between; margin-top: 22px; padding-top: 16px; border-top: 1px solid var(--line); }

  /* ===== Calendar ===== */
  .calendar-wrap {
    background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 20px;
  }
  .cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .cal-title { font-size: 16px; font-weight: 700; }
  .cal-nav { display: flex; gap: 6px; }
  .cal-nav button {
    width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--line);
    background: #fff; cursor: pointer; font-size: 14px; color: var(--text);
  }
  .cal-nav button:hover { background: var(--bg); }
  .cal-nav .today-btn { width: auto; padding: 0 12px; font-size: 12.5px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-dow { text-align: center; font-size: 11.5px; color: var(--sub); font-weight: 600; padding: 6px 0; }
  .cal-dow.sun { color: #ef4444; }
  .cal-dow.sat { color: var(--accent); }
  .cal-cell {
    min-height: 64px; border-radius: 8px; padding: 5px 6px; font-size: 12.5px;
    cursor: pointer; border: 1px solid transparent; position: relative;
  }
  .cal-cell:hover { background: var(--bg); }
  .cal-cell.other-month { color: #c4c8cf; }
  .cal-cell.today .day-num {
    background: var(--accent); color: #fff; border-radius: 50%;
    width: 22px; height: 22px; display: inline-flex; align-items: center; justify-content: center;
  }
  .cal-cell.selected { border-color: var(--accent); background: var(--accent-soft); }
  .day-num { font-weight: 600; }
  .cal-ev {
    font-size: 10px; background: var(--accent-soft); color: var(--accent);
    border-radius: 4px; padding: 1px 4px; margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 600;
  }
  .cal-ev.entry { background: var(--accent); color: #fff; }
  .cal-ev.range-mid { border-radius: 0; opacity: .85; }
  .cal-ev.more { background: none; color: var(--sub); }
  .day-events { margin-top: 16px; border-top: 1px solid var(--line); padding-top: 14px; }
  .day-events h3 { font-size: 13.5px; margin-bottom: 10px; color: var(--sub); }
  .day-ev-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    border: 1px solid var(--line); border-radius: 10px; margin-bottom: 8px; cursor: pointer;
  }
  .day-ev-item:hover { border-color: var(--accent); }
  .day-ev-time { font-size: 12px; color: var(--accent); font-weight: 700; min-width: 44px; }
  .day-ev-name { font-weight: 700; font-size: 13.5px; }
  .day-ev-kind { font-size: 11.5px; color: var(--sub); }
  .no-events { color: var(--sub); font-size: 13px; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">就活<span>キロク</span></div>
    <div class="header-right">
      <span class="save-status" id="saveStatus">✓ 保存済み</span>
      <button class="gear-btn" id="openBackupBtn" title="バックアップ">⚙</button>
      <button class="add-btn" id="openAddBtn" title="新規追加">＋</button>
    </div>
  </div>
</header>

<div class="container">

  <!-- 進行中 -->
  <div class="section">
    <div class="section-title">
      <span class="dot" style="background:var(--accent)"></span>進行中
      <span class="count" id="countOngoing">0</span>
    </div>
    <div class="card-list" id="listOngoing"></div>
  </div>

  <!-- 予定 / 振り返り -->
  <div class="section two-col">
    <div>
      <div class="section-title">
        <span class="dot" style="background:var(--orange)"></span>これからの予定
        <span class="count" id="countUpcoming" style="background:var(--orange)">0</span>
      </div>
      <div class="card-list" id="listUpcoming"></div>
    </div>
    <div>
      <div class="section-title">
        <span class="dot" style="background:var(--green)"></span>振り返り
        <span class="count" id="countDone" style="background:var(--green)">0</span>
      </div>
      <div class="card-list" id="listDone"></div>
    </div>
  </div>

  <!-- カレンダー -->
  <div class="section">
    <div class="section-title">📅 カレンダー</div>
    <div class="calendar-wrap">
      <div class="cal-head">
        <div class="cal-title" id="calTitle"></div>
        <div class="cal-nav">
          <button id="calPrev">‹</button>
          <button class="today-btn" id="calToday">今日</button>
          <button id="calNext">›</button>
        </div>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="day-events" id="dayEvents" style="display:none"></div>
    </div>
  </div>

</div>

<!-- 新規追加モーダル -->
<div class="overlay" id="addOverlay">
  <div class="modal">
    <h2>新規追加</h2>
    <div class="field">
      <label>会社名・タイトル</label>
      <input type="text" id="addName" placeholder="例：〇〇株式会社">
    </div>
    <div class="field">
      <label>種類</label>
      <div class="type-options" id="typeOptions"></div>
    </div>
    <div class="field" id="customTypeField" style="display:none">
      <label>カスタム種類名</label>
      <input type="text" id="customTypeInput" placeholder="例：座談会">
    </div>
    <div class="field">
      <label>日程（任意）</label>
      <div class="dt-row">
        <span class="dt-label">開始</span>
        <input type="date" id="addStartDate">
        <input type="time" id="addTime">
      </div>
      <div class="dt-row">
        <span class="dt-label">終了</span>
        <input type="date" id="addEndDate">
        <input type="time" id="addEndTime">
      </div>
    </div>
    <div class="field">
      <label>場所（任意）</label>
      <div class="type-options" id="locOptions">
        <button class="type-chip" data-loc="">なし</button>
        <button class="type-chip" data-loc="online">オンライン</button>
        <button class="type-chip" data-loc="offline">対面</button>
      </div>
      <div id="locValueWrap" style="display:none; margin-top:8px">
        <input type="text" id="addLocValue" placeholder="">
      </div>
    </div>
    <div class="field">
      <label>ステータス</label>
      <select id="addStatus">
        <option value="ongoing">進行中</option>
        <option value="upcoming">これからの予定</option>
        <option value="done">振り返り（終了）</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="addCancel">キャンセル</button>
      <button class="btn btn-primary" id="addSave">追加する</button>
    </div>
  </div>
</div>

<!-- バックアップモーダル -->
<div class="overlay" id="backupOverlay">
  <div class="modal">
    <h2>⚙ データのバックアップ</h2>
    <p class="backup-note">
      記録はこのブラウザ内（localStorage）に自動保存されています。<br>
      <strong>別の端末・ブラウザには引き継がれない</strong>ため、定期的にエクスポートしてバックアップするのがおすすめです。
      機種変更やブラウザのデータ削除の前には必ずエクスポートしてください。
    </p>
    <div class="backup-actions">
      <button class="btn btn-primary" id="exportBtn">⬇ エクスポート（JSON保存）</button>
      <button class="btn btn-outline" id="importBtn">⬆ インポート（復元）</button>
      <input type="file" id="importFile" accept=".json,application/json" style="display:none">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="backupClose">閉じる</button>
    </div>
  </div>
</div>

<!-- 詳細モーダル -->
<div class="overlay" id="detailOverlay">
  <div class="modal detail-modal" id="detailModal"></div>
</div>

<script>
'use strict';

/* ============ データ ============ */
const STORAGE_KEY = 'syuukatsu-kiroku-v1';
const DEFAULT_TYPES = ['セミナー', 'ワークショップ', '説明会', 'オープンカンパニー', '本選考', 'インターン', '夏インターン', '冬インターン'];
const MARKS = ['ES通過', '参加決定'];
const STEP_KINDS = {
  'ES':                     { questions: true,  qTags: false, note: false },
  '動画視聴':                { questions: false, qTags: false, note: true  },
  '説明会':                  { questions: false, qTags: false, note: true  },
  '面接':                    { questions: true,  qTags: true,  note: true  },
  'グループディスカッション': { questions: false, qTags: false, note: true  },
  '動画選考':                { questions: true,  qTags: false, note: true  },
};

let state = load();
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return { entries: [], customTypes: [] };
}

/* 即時保存：遅延なしでlocalStorageへ書き込む（モバイルで閉じてもデータが残る） */
let indicatorTimer = null;
function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    const el = document.getElementById('saveStatus');
    const t = new Date();
    el.textContent = `✓ 保存済み ${String(t.getHours()).padStart(2, '0')}:${String(t.getMinutes()).padStart(2, '0')}`;
    el.classList.add('show');
    clearTimeout(indicatorTimer);
    indicatorTimer = setTimeout(() => el.classList.remove('show'), 2500);
  } catch (err) {
    alert('保存に失敗しました。プライベートブラウズモードでは保存できません。');
  }
}

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
const esc = s => (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

/* ============ ホーム描画 ============ */
function nextDateOf(entry) {
  const today = new Date().toISOString().slice(0, 10);
  const dates = entry.steps.filter(s => s.date && s.date >= today).map(s => s.date);
  if (entry.startDate && (entry.endDate || entry.startDate) >= today) {
    dates.push(entry.startDate >= today ? entry.startDate : today);
  }
  return dates.sort()[0] || null;
}

function entryDateLabel(e) {
  if (!e.startDate) return '';
  const f = d => d.slice(5).replace('-', '/');
  if (e.endDate) return `${f(e.startDate)}〜${f(e.endDate)}`;
  let t = e.time ? ' ' + e.time : '';
  if (e.time && e.endTime) t += '〜' + e.endTime;
  return f(e.startDate) + t;
}

function locLabel(e) {
  if (!e.locType) return '';
  return e.locType === 'online' ? '🔗 オンライン' : '📍 対面';
}

function renderHome() {
  const groups = { ongoing: [], upcoming: [], done: [] };
  state.entries.forEach(e => (groups[e.status] || groups.ongoing).push(e));

  // 直近の予定が近い順に並べる（日程なしは後ろ）。振り返りは新しい日付順
  const byNext = (a, b) => {
    const da = nextDateOf(a), db = nextDateOf(b);
    if (da && db) return da.localeCompare(db);
    return da ? -1 : db ? 1 : 0;
  };
  groups.ongoing.sort(byNext);
  groups.upcoming.sort(byNext);
  groups.done.sort((a, b) => (b.startDate || '').localeCompare(a.startDate || ''));

  const render = (listId, countId, arr, emptyMsg) => {
    document.getElementById(countId).textContent = arr.length;
    const list = document.getElementById(listId);
    if (!arr.length) {
      list.innerHTML = `<div class="empty-hint">${emptyMsg}</div>`;
      return;
    }
    list.innerHTML = arr.map(e => {
      const next = nextDateOf(e);
      const doneSteps = e.steps.filter(s => s.done).length;
      return `<div class="entry-card" onclick="openDetail('${e.id}')">
        <div class="top">
          <span class="entry-name">${esc(e.name)}</span>
          <span style="display:flex; gap:6px; align-items:center">
            ${(e.marks || []).map(m => `<span class="result-badge">✓ ${esc(m)}</span>`).join('')}
            <span class="type-badge">${esc(e.type)}</span>
          </span>
        </div>
        <div class="entry-meta">
          ${entryDateLabel(e) ? `<span>📅 ${entryDateLabel(e)}</span>` : ''}
          ${locLabel(e) ? `<span>${locLabel(e)}</span>` : ''}
          <span>📋 ステップ ${doneSteps}/${e.steps.length}件</span>
          ${next ? `<span>⏰ 次回 ${next.replace(/-/g, '/')}</span>` : ''}
        </div>
      </div>`;
    }).join('');
  };

  render('listOngoing', 'countOngoing', groups.ongoing, 'まだありません。右上の＋から追加しましょう');
  render('listUpcoming', 'countUpcoming', groups.upcoming, '予定はありません');
  render('listDone', 'countDone', groups.done, 'まだありません');
  renderCalendar();
}

document.getElementById('addSave').onclick = () => {
  const name = document.getElementById('addName').value.trim();
  if (!name) { alert('会社名・タイトルを入力してください'); return; }
  let type = selectedType;
  if (!type) { alert('種類を選んでください'); return; }
  if (type === '__custom__') {
    type = document.getElementById('customTypeInput').value.trim();
    if (!type) { alert('カスタム種類名を入力してください'); return; }

  }
  const startDate = document.getElementById('addStartDate').value;
  let endDate = document.getElementById('addEndDate').value;
  if (!startDate || (endDate && endDate < startDate)) endDate = '';
  if (endDate === startDate) endDate = '';
  const entry = {
    id: uid(), name, type,
    status: document.getElementById('addStatus').value,
    startDate, endDate,
    time: startDate ? document.getElementById('addTime').value : '',

    locType: selectedLoc,
    locValue: selectedLoc ? document.getElementById('addLocValue').value.trim() : '',

let currentId = null;
const openSteps = new Set();

function getEntry() { return state.entries.find(e => e.id === currentId); }

        <input type="time" data-efield="endTime" value="${esc(e.endTime)}">
      </div>
    </div>
    <div style="margin-bottom:14px">
      <span class="mini-label">場所</span>
      <div class="type-options" style="margin-bottom:8px">

      </div>

function renderStep(e, s) {
  const cfg = STEP_KINDS[s.kind] || { note: true };
  const isOpen = openSteps.has(s.id);
  const dateLabel = s.date ? s.date.replace(/-/g, '/') + (s.time ? ' ' + s.time : '') : '日時未定';

  let inner = `
    <div class="step-datetime">
      <input type="date" data-sid="${s.id}" data-field="date" value="${esc(s.date)}">
      <input type="time" data-sid="${s.id}" data-field="time" value="${esc(s.time)}">
    </div>`;

  if (cfg.questions) {
    const qLabel = s.kind === 'ES' ? '設問' : '質問';
    inner += (s.questions || []).map((q, i) => `
      <div class="q-item">
        <div class="q-item-head">
          <span class="q-num">${qLabel} ${i + 1}</span>
          ${cfg.qTags ? `
            <select class="q-tag-select ${q.tag === '本番' ? 'tag-honban' : 'tag-yosoku'}" data-sid="${s.id}" data-qid="${q.id}" data-field="tag">
              <option value="予測" ${q.tag !== '本番' ? 'selected' : ''}>予測</option>
              <option value="本番" ${q.tag === '本番' ? 'selected' : ''}>本番</option>
            </select>` : ''}
          <button class="q-del" onclick="deleteQuestion('${s.id}','${q.id}')">🗑</button>
        </div>
        <span class="mini-label">${qLabel}</span>
        <textarea class="q-question" data-sid="${s.id}" data-qid="${q.id}" data-field="q" placeholder="${qLabel}内容を入力…">${esc(q.q)}</textarea>
        <span class="mini-label">${s.kind === 'ES' ? '回答・メモ' : '自分の回答・メモ'}</span>
        <textarea data-sid="${s.id}" data-qid="${q.id}" data-field="a" placeholder="回答やメモを入力…">${esc(q.a)}</textarea>
      </div>`).join('');
    inner += `<button class="add-mini-btn" onclick="addQuestion('${s.id}')">＋ ${qLabel}を追加</button>`;
  }

  if (cfg.note) {
    inner += `
      <div style="margin-top:12px">
        <span class="mini-label">ノート</span>
        <textarea data-sid="${s.id}" data-field="note" placeholder="メモ・感想・反省点など…">${esc(s.note)}</textarea>
      </div>`;
  }

  return `
    <div class="step-card ${isOpen ? 'open' : ''} ${s.done ? 'done' : ''}" id="step-${s.id}">
      <div class="step-head" onclick="toggleStep('${s.id}')">
        <div class="left">
          <span class="chev">▶</span>
          <button class="done-btn ${s.done ? 'on' : ''}" title="完了にする" onclick="event.stopPropagation(); toggleStepDone('${s.id}')">✓</button>
          <span class="step-kind">${esc(s.kind)}</span>
          <span class="step-date-label">${dateLabel}</span>
        </div>
        <button class="q-del" onclick="event.stopPropagation(); deleteStep('${s.id}')">🗑</button>
      </div>
      <div class="step-body">${inner}</div>
    </div>`;
}

function bindStepInputs() {
  document.querySelectorAll('#detailModal [data-efield]').forEach(el => {
    el.addEventListener('input', () => {
      const e = getEntry(); if (!e) return;
      e[el.dataset.efield] = el.value;
      if (e.endDate && (!e.startDate || e.endDate <= e.startDate)) e.endDate = '';
      save();
      renderCalendar();
    });
  });
  document.querySelectorAll('#detailModal [data-sid]').forEach(el => {
    el.addEventListener('input', () => {
      const e = getEntry(); if (!e) return;
      const s = e.steps.find(x => x.id === el.dataset.sid); if (!s) return;
      const f = el.dataset.field;
      if (el.dataset.qid) {
        const q = (s.questions || []).find(x => x.id === el.dataset.qid); if (!q) return;
        q[f] = el.value;
        if (f === 'tag') {
          el.classList.toggle('tag-honban', el.value === '本番');
          el.classList.toggle('tag-yosoku', el.value !== '本番');
        }
      } else {
        s[f] = el.value;
        if (f === 'date' || f === 'time') {
          const label = document.querySelector(`#step-${s.id} .step-date-label`);
          if (label) label.textContent = s.date ? s.date.replace(/-/g, '/') + (s.time ? ' ' + s.time : '') : '日時未定';
          renderCalendar();
        }
      }
      save();
    });
  });
}

window.setStatus = val => { const e = getEntry(); if (e) { e.status = val; save(true); renderDetail(); } };
window.setLocType = val => {
  const e = getEntry(); if (!e) return;
  if (e.locType !== val) e.locValue = '';
  e.locType = val;
  save(true); renderDetail();
};
window.toggleMark = m => {
  const e = getEntry(); if (!e) return;
  e.marks = e.marks || [];
  e.marks.includes(m) ? e.marks = e.marks.filter(x => x !== m) : e.marks.push(m);
  save(true); renderDetail();
};
window.toggleStepDone = sid => {
  const e = getEntry(); if (!e) return;
  const s = e.steps.find(x => x.id === sid); if (!s) return;
  s.done = !s.done;
  save(true);
  const card = document.getElementById('step-' + sid);
  card.classList.toggle('done', s.done);
  card.querySelector('.done-btn').classList.toggle('on', s.done);
};
window.toggleStep = sid => {
  openSteps.has(sid) ? openSteps.delete(sid) : openSteps.add(sid);
  document.getElementById('step-' + sid).classList.toggle('open');
};
window.addStep = kind => {
  const e = getEntry(); if (!e) return;
  const s = { id: uid(), kind, date: '', time: '', note: '', questions: [] };
  e.steps.push(s);
  openSteps.add(s.id);
  save(true);
  renderDetail();
};
window.deleteStep = sid => {
  if (!confirm('このステップを削除しますか？')) return;
  const e = getEntry(); if (!e) return;
  e.steps = e.steps.filter(s => s.id !== sid);
  save(true); renderDetail();
};
window.addQuestion = sid => {
  const e = getEntry(); if (!e) return;
  const s = e.steps.find(x => x.id === sid); if (!s) return;
  (s.questions = s.questions || []).push({ id: uid(), q: '', a: '', tag: '予測' });
  save(true); renderDetail();
};
window.deleteQuestion = (sid, qid) => {
  const e = getEntry(); if (!e) return;
  const s = e.steps.find(x => x.id === sid); if (!s) return;
  s.questions = (s.questions || []).filter(q => q.id !== qid);
  save(true); renderDetail();
};
window.deleteEntry = () => {
  const e = getEntry(); if (!e) return;
  if (!confirm(`「${e.name}」を削除しますか？この操作は取り消せません。`)) return;
  state.entries = state.entries.filter(x => x.id !== currentId);
  save(true); closeDetail();
};
window.openDetail = openDetail;
window.closeDetail = closeDetail;

/* ============ カレンダー ============ */
let calYear, calMonth, selectedDay = null;
{
  const now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth();
}

function allEvents() {
  const evs = [];
  state.entries.forEach(e => {
    if (e.startDate) {
      const end = (e.endDate && e.endDate > e.startDate) ? e.endDate : e.startDate;
      const isRange = end !== e.startDate;
      let d = new Date(e.startDate + 'T00:00:00');
      const endD = new Date(end + 'T00:00:00');
      let guard = 0;
      while (d <= endD && guard++ < 92) {
        const ds = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        evs.push({
          date: ds, time: ds === e.startDate ? ((e.time || '') + (!isRange && e.time && e.endTime ? '〜' + e.endTime : '')) : '',
          name: e.name, kind: e.type, entryId: e.id,
          isEntry: true, isRange,
          rangePos: !isRange ? '' : ds === e.startDate ? 'start' : ds === end ? 'end' : 'mid',
          rangeLabel: isRange ? `${e.startDate.slice(5).replace('-', '/')}〜${end.slice(5).replace('-', '/')}` : '',
        });
        d.setDate(d.getDate() + 1);
      }
    }
    e.steps.forEach(s => {
      if (s.date) evs.push({ date: s.date, time: s.time || '', name: e.name, kind: s.kind, entryId: e.id });
    });
  });
  evs.sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time));
  return evs;
}

function renderCalendar() {
  const grid = document.getElementById('calGrid');
  document.getElementById('calTitle').textContent = `${calYear}年 ${calMonth + 1}月`;

  const evs = allEvents();
  const byDate = {};
  evs.forEach(ev => (byDate[ev.date] = byDate[ev.date] || []).push(ev));

  const dows = ['日', '月', '火', '水', '木', '金', '土'];
  let html = dows.map((d, i) =>
    `<div class="cal-dow ${i === 0 ? 'sun' : i === 6 ? 'sat' : ''}">${d}</div>`).join('');

  const first = new Date(calYear, calMonth, 1);
  const start = new Date(first);
  start.setDate(1 - first.getDay());
  const todayStr = new Date().toISOString().slice(0, 10);

  for (let i = 0; i < 42; i++) {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    const ds = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    const other = d.getMonth() !== calMonth;
    const dayEvs = byDate[ds] || [];
    const shown = dayEvs.slice(0, 2);
    html += `<div class="cal-cell ${other ? 'other-month' : ''} ${ds === todayStr ? 'today' : ''} ${ds === selectedDay ? 'selected' : ''}" data-date="${ds}">
      <span class="day-num">${d.getDate()}</span>
      ${shown.map(ev => `<div class="cal-ev ${ev.isEntry ? 'entry' : ''} ${ev.rangePos === 'mid' ? 'range-mid' : ''}">${ev.rangePos === 'mid' || ev.rangePos === 'end' ? '┈ ' : ''}${esc(ev.name)}</div>`).join('')}
      ${dayEvs.length > 2 ? `<div class="cal-ev more">他${dayEvs.length - 2}件</div>` : ''}
    </div>`;
  }
  grid.innerHTML = html;
  grid.querySelectorAll('.cal-cell').forEach(c => {
    c.onclick = () => { selectedDay = c.dataset.date; renderCalendar(); };
  });

  const panel = document.getElementById('dayEvents');
  if (selectedDay) {
    const dayEvs = byDate[selectedDay] || [];
    panel.style.display = '';
    panel.innerHTML = `<h3>${selectedDay.replace(/-/g, '/')} の予定</h3>` +
      (dayEvs.length
        ? dayEvs.map(ev => `<div class="day-ev-item" onclick="openDetail('${ev.entryId}')">
            <span class="day-ev-time">${ev.isRange ? '期間' : (ev.time || '--:--')}</span>
            <div><div class="day-ev-name">${esc(ev.name)}</div><div class="day-ev-kind">${esc(ev.kind)}${ev.rangeLabel ? '・' + ev.rangeLabel : ''}</div></div>
          </div>`).join('')
        : '<div class="no-events">この日の予定はありません</div>');
  } else {
    panel.style.display = 'none';
  }
}

document.getElementById('calPrev').onclick = () => { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCalendar(); };
document.getElementById('calNext').onclick = () => { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCalendar(); };
document.getElementById('calToday').onclick = () => {

  calYear = now.getFullYear(); calMonth = now.getMonth();
  selectedDay = now.toISOString().slice(0, 10);
  renderCalendar();
};

document.getElementById('importBtn').onclick = () => document.getElementById('importFile').click();
document.getElementById('importFile').addEventListener('change', ev => {
  const file = ev.target.files[0];
  ev.target.value = '';
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!data || !Array.isArray(data.entries)) throw new Error('invalid');
      if (!confirm(`バックアップから ${data.entries.length} 件の記録を読み込みます。\n現在のデータは上書きされます。よろしいですか？`)) return;
      state = { entries: data.entries, customTypes: Array.isArray(data.customTypes) ? data.customTypes : [] };
      save();
      renderHome();
      document.getElementById('backupOverlay').classList.remove('open');
      alert('読み込みが完了しました');
    } catch (err) {
      alert('ファイルを読み込めませんでした。エクスポートしたJSONファイルを選んでください。');
    }
  };
  reader.readAsText(file);
});

renderHome();
</script>
</body>
</html>
